<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioConnect | BMT 23/24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        :root { --primary: #4ade80; --bg: #030712; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-active { color: var(--primary); font-weight: 800; border-bottom: 2px solid var(--primary); opacity: 1 !important; }
        .page-hidden { display: none; }
        .modal-hidden { opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.3s; }
        .modal-show { opacity: 1; pointer-events: auto; transform: translateY(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-5xl glass rounded-[32px] px-8 py-5 flex justify-between items-center shadow-2xl" data-aos="fade-down">
        <span class="text-xl font-black tracking-tighter uppercase">BIO<span class="text-green-400">CONNECT</span></span>
        <div class="flex gap-6 text-[10px] uppercase font-bold tracking-[0.2em]">
            <button onclick="nav('home')" id="btn-home" class="nav-active">Home</button>
            <button onclick="nav('vault')" id="btn-vault" class="opacity-40 hover:opacity-100">Vault</button>
            <button onclick="checkAccess()" id="btn-links" class="opacity-40 text-green-400 hover:opacity-100">Zoom Portal</button>
        </div>
    </nav>

    <div id="login-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-xl modal-hidden">
        <div class="glass p-12 rounded-[50px] w-[350px] text-center border-t-8 border-green-500 shadow-[0_0_50px_rgba(74,222,128,0.1)]">
            <h2 class="text-2xl font-black mb-2 uppercase italic">BMT Access</h2>
            <p class="text-[9px] opacity-40 mb-8 uppercase tracking-[0.3em]">Authorized Students Only</p>
            <input type="password" id="pass-input" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-center text-xl focus:outline-none focus:border-green-500 mb-6">
            <button onclick="verifyPass()" class="w-full bg-green-500 text-black font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest hover:scale-105 transition-all">Unlock Site</button>
            <button onclick="closeLogin()" class="mt-6 text-[9px] uppercase opacity-30 hover:opacity-100">Close</button>
        </div>
    </div>

    <main id="page-home" class="pt-32 px-6 max-w-7xl mx-auto pb-20">
        <section class="relative h-[450px] rounded-[60px] overflow-hidden glass mb-12 shadow-2xl" data-aos="zoom-in">
            <img id="banner-img" src="https://images.unsplash.com/photo-1532187863486-abf9d39d99c5?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-30">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
            <div class="absolute bottom-16 left-16">
                <p class="text-green-400 font-bold text-xs uppercase tracking-[0.4em] mb-4">University of Indigenous Medicine</p>
                <h1 class="text-7xl font-black text-white leading-none uppercase tracking-tighter">BMT <span class="text-green-400">23/24</span></h1>
            </div>
        </section>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="lg:col-span-2 space-y-8">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.5em] ml-4">Latest Announcements</h3>
                <div id="news-list" class="space-y-4">
                    <div class="p-10 glass rounded-[40px] animate-pulse text-center opacity-20 italic text-xs">Syncing with cloud...</div>
                </div>
            </div>
            <aside class="space-y-8">
                <div class="glass p-10 rounded-[50px] border-l-8 border-pink-500 shadow-xl" data-aos="fade-left">
                    <h3 class="text-[9px] font-black text-pink-500 uppercase mb-4 tracking-widest">Celebrations</h3>
                    <p id="bday-text" class="text-2xl font-bold text-white italic">Searching...</p>
                </div>
            </aside>
        </div>
    </main>

    <main id="page-vault" class="page-hidden pt-32 px-6 max-w-7xl mx-auto">
        <h2 class="text-5xl font-black text-center mb-16 uppercase tracking-tighter italic">Batch <span class="text-green-400">Vault</span></h2>
        <div id="vault-grid" class="grid md:grid-cols-3 gap-8"></div>
    </main>

    <main id="page-links" class="page-hidden pt-32 px-6 max-w-4xl mx-auto">
        <h2 class="text-4xl font-black text-center mb-12 uppercase italic text-green-400">Active Lecture Links</h2>
        <div class="grid gap-6">
            <div class="glass p-10 rounded-[45px] flex justify-between items-center border-l-8 border-blue-500 group hover:bg-white/5 transition-all">
                <div><h4 class="text-xl font-bold mb-1">Today's Lectures</h4><p class="text-[10px] opacity-40 uppercase tracking-widest">Update daily from WhatsApp</p></div>
                <a href="https://zoom.us" target="_blank" class="bg-blue-500 text-white px-10 py-4 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-500/20">Join Session</a>
            </div>
        </div>
    </main>

    <script>
        const sheetID = "1SqbfMALnUaJonxSlEXH1Of0AmPKD2Jnyjmwl0XtYH4U";
        const BATCH_PASS = "BMT2026"; // Change your password here
        let isAuthorized = false;

        function nav(id) {
            document.querySelectorAll('main').forEach(p => p.classList.add('page-hidden'));
            document.getElementById('page-'+id).classList.remove('page-hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-'+id).classList.add('nav-active');
            window.scrollTo(0,0);
            AOS.refresh();
        }

        function checkAccess() {
            if (isAuthorized) { nav('links'); } 
            else { document.getElementById('login-modal').classList.add('modal-show'); document.getElementById('login-modal').classList.remove('modal-hidden'); }
        }

        function verifyPass() {
            if (document.getElementById('pass-input').value === BATCH_PASS) {
                isAuthorized = true; closeLogin(); nav('links');
            } else { alert("Access Denied."); }
        }

        function closeLogin() { 
            document.getElementById('login-modal').classList.add('modal-hidden'); 
            document.getElementById('login-modal').classList.remove('modal-show'); 
        }

        async function loadData() {
            try {
                const proxy = "https://api.allorigins.win/raw?url=";
                const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
                const response = await fetch(proxy + encodeURIComponent(url));
                const text = await response.text();
                const rows = text.split(/\r?\n/).slice(1);

                const newsBox = document.getElementById('news-list');
                const vaultBox = document.getElementById('vault-grid');
                const bdayBox = document.getElementById('bday-text');
                const banner = document.getElementById('banner-img');

                newsBox.innerHTML = ''; vaultBox.innerHTML = '';
                const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length < 3) return;
                    const [date, type, title, link] = cols;

                    if (type === "News") {
                        newsBox.innerHTML += `<div class="glass p-8 rounded-[40px] flex justify-between items-center group border border-white/5"><div class="flex flex-col"><span class="text-[8px] text-green-400 font-bold uppercase tracking-[0.3em] mb-1">${date}</span><p class="font-bold text-white group-hover:translate-x-2 transition-all">${title}</p></div><div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_15px_#4ade80]"></div></div>`;
                    } else if (type === "Note") {
                        vaultBox.innerHTML += `<div class="glass p-16 rounded-[60px] text-center border border-white/5 hover:border-green-500/30 transition-all"><h4 class="font-black text-xl uppercase mb-8 tracking-tighter leading-none">${title}</h4><a href="${link}" target="_blank" class="inline-block px-12 py-4 bg-white text-black text-[10px] font-black uppercase rounded-full hover:bg-green-400 transition-all">Get PDF</a></div>`;
                    } else if (type === "Birthday" && date.trim() === today) {
                        bdayBox.innerHTML = `Happy Birthday, <span class="text-green-400">${title}</span>! 🎂`;
                        if(link && link.includes('http')) banner.src = link;
                    }
                });
                if(bdayBox.innerText === "Searching...") bdayBox.innerText = "No Birthdays Today";
            } catch (e) { console.log(e); }
        }

        window.onload = () => { AOS.init({ duration: 1000, once: true }); loadData(); };
    </script>
</body>
</html>
