<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioConnect | BMT 23/24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background-color: #020408; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-btn.active { color: #4ade80; border-bottom: 2px solid #4ade80; }
        .page-content { display: none; opacity: 0; transition: 0.5s ease; }
        .page-content.active { display: block !important; opacity: 1; }
        .card-glow:hover { border-color: #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.1); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 glass px-8 py-5 flex justify-between items-center mx-4 mt-4 rounded-3xl" data-aos="fade-down">
        <h1 class="text-xl font-extrabold text-white uppercase tracking-tighter">BioConnect</h1>
        <div class="flex gap-6 text-[10px] font-black uppercase tracking-widest">
            <button onclick="showPage('home')" id="home-btn" class="nav-btn active">Home</button>
            <button onclick="showPage('calendar')" id="calendar-btn" class="nav-btn">Calendar</button>
            <button onclick="showPage('academics')" id="academics-btn" class="nav-btn">Academics</button>
        </div>
    </nav>

    <div id="home-page" class="page-content active max-w-6xl mx-auto px-4 mt-8">
        <div class="relative h-[350px] rounded-[50px] overflow-hidden mb-12 glass shadow-2xl" data-aos="zoom-out">
            <img id="main-banner" src="https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-40">
            <div class="absolute bottom-10 left-10 z-20">
                <h2 class="text-6xl font-black text-white uppercase tracking-tighter leading-none">Batch <span class="text-green-400">23/24</span></h2>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="md:col-span-2">
                <h3 class="text-[10px] font-black mb-6 uppercase tracking-widest text-slate-500">Live Announcements</h3>
                <div id="news-list" class="space-y-4 text-xs italic opacity-30">Connecting to Google Cloud...</div>
            </div>
            <div class="glass p-8 rounded-[40px] border-l-4 border-pink-500 h-fit" data-aos="fade-left">
                <h3 class="text-[10px] font-black text-pink-500 uppercase tracking-widest mb-4">Celebrations</h3>
                <p id="birthday-name" class="text-xl font-bold text-white italic">Searching...</p>
            </div>
        </div>
    </div>

    <div id="calendar-page" class="page-content max-w-6xl mx-auto px-4 mt-12 text-center">
        <div class="glass p-20 rounded-[50px]">
            <h2 class="text-4xl font-black uppercase mb-4 text-green-400">Lecture Schedule</h2>
            <p class="text-white font-bold tracking-[0.2em] uppercase">Main Hall | 08:00 AM - 04:00 PM</p>
        </div>
    </div>

    <div id="academics-page" class="page-content max-w-6xl mx-auto px-4 mt-12">
        <h2 class="text-5xl font-black text-center mb-12 uppercase tracking-tighter">The Vault</h2>
        <div id="notes-grid" class="grid sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </div>

    <footer class="mt-20 text-center opacity-30 pb-10 border-t border-white/5 pt-10 mx-10">
        <p class="text-[9px] font-bold uppercase tracking-[0.5em] text-white">&copy; 2026 Biomedical Technology | GWUIM</p>
    </footer>

   <script>
    const sheetID = "1SqbfMALnUaJonxSlEXH1Of0AmPKD2Jnyjmwl0XtYH4U";
    
    // NAVIGATION
    function showPage(pageId) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId + '-page').classList.add('active');
        document.getElementById(pageId + '-btn').classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        AOS.refresh();
    }

    // DATA LOADER
    async function loadData() {
        const newsBox = document.getElementById('news-list');
        const notesBox = document.getElementById('notes-grid');
        const bdayBox = document.getElementById('birthday-name');
        const banner = document.getElementById('main-banner');

        try {
            // Using a proxy to bypass the "Sync Error" security block
            const proxy = "https://api.allorigins.win/raw?url=";
            const target = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;
            
            const response = await fetch(proxy + encodeURIComponent(target));
            const text = await response.text();
            const rows = text.split(/\r?\n/).slice(1);

            if(rows.length > 0) {
                newsBox.innerHTML = '';
                notesBox.innerHTML = '';
            }

            const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length < 3) return;
                const [date, type, title, link] = cols;

                if (type === "News") {
                    newsBox.innerHTML += `
                        <div class="glass p-6 rounded-[24px] flex justify-between items-center border border-white/5 shadow-lg">
                            <div><p class="text-sm font-bold text-white">${title}</p><p class="text-[8px] text-slate-500 uppercase mt-1">${date}</p></div>
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                        </div>`;
                } else if (type === "Note") {
                    notesBox.innerHTML += `
                        <div class="glass p-10 rounded-[40px] border border-white/5 text-center transition-all hover:border-green-400">
                            <h3 class="text-lg font-black uppercase mb-6">${title}</h3>
                            <a href="${link}" target="_blank" class="px-8 py-3 rounded-full bg-white text-black text-[9px] font-black uppercase">Open Vault</a>
                        </div>`;
                } else if (type === "Birthday" && date.trim() === today) {
                    bdayBox.innerHTML = `Happy Birthday, <span class="text-green-400">${title}</span>! 🎂`;
                    if(link) banner.src = link;
                }
            });

            if(bdayBox.innerText === "Searching...") bdayBox.innerText = "No birthdays today";

        } catch (e) {
            newsBox.innerHTML = "<p class='text-red-500 text-xs italic'>Connection Blocked. Try opening the file in a different browser or uploading it to GitHub.</p>";
        }
    }

    window.onload = () => { 
        AOS.init({ duration: 1000, once: true });
        loadData(); 
    };
</script>
</body>
</html>
