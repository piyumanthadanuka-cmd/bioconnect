<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioConnect | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body { background-color: #030712; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-active { color: #4ade80; border-bottom: 2px solid #4ade80; opacity: 1 !important; }
        .page-hidden { display: none; }
        .modal-hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .modal-show { opacity: 1; pointer-events: auto; transform: scale(1); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[95%] max-w-4xl glass rounded-3xl px-6 py-4 flex justify-between items-center shadow-2xl">
        <span class="text-lg font-extrabold tracking-tighter uppercase">Bio<span class="text-green-400">Connect</span></span>
        <div class="flex gap-4 text-[10px] uppercase font-bold tracking-widest">
            <button onclick="nav('home')" id="btn-home" class="nav-active">Home</button>
            <button onclick="nav('academics')" id="btn-academics" class="opacity-50">Vault</button>
            <button onclick="checkAccess()" id="btn-links" class="opacity-50 text-green-400">Zoom Links</button>
        </div>
    </nav>

    <div id="login-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md modal-hidden">
        <div class="glass p-10 rounded-[40px] w-80 text-center border-t-4 border-green-500">
            <h2 class="text-xl font-black mb-2 uppercase">Student Login</h2>
            <p class="text-[10px] opacity-50 mb-6 uppercase tracking-widest">Batch 23/24 Access Only</p>
            <input type="password" id="pass-input" placeholder="Enter Batch Password" class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-green-500 mb-4 text-center">
            <button onclick="verifyPass()" class="w-full bg-green-500 text-black font-black py-3 rounded-2xl text-xs uppercase hover:bg-white transition-all">Unlock Portal</button>
            <button onclick="closeLogin()" class="mt-4 text-[9px] uppercase opacity-30 hover:opacity-100">Cancel</button>
        </div>
    </div>

    <main id="page-home" class="pt-32 px-6 max-w-6xl mx-auto">
        <div class="glass h-64 rounded-[40px] flex items-end p-10 mb-8 overflow-hidden relative">
            <img src="https://images.unsplash.com/photo-1517817748493-49ec54a32465?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-20">
            <h1 class="text-5xl font-black relative z-10 uppercase tracking-tighter">Welcome, <span class="text-green-400">Batch!</span></h1>
        </div>
    </main>

    <main id="page-links" class="page-hidden pt-32 px-6 max-w-4xl mx-auto">
        <h2 class="text-4xl font-black mb-8 text-center uppercase italic text-green-400">Lecture Portal</h2>
        <div class="grid gap-4">
            <div class="glass p-8 rounded-[35px] flex justify-between items-center border-l-4 border-blue-500">
                <div><h4 class="font-bold">Biology Lecture</h4><p class="text-[10px] opacity-50">Dr. Perera | 08:30 AM</p></div>
                <a href="https://zoom.us/join" target="_blank" class="bg-blue-500 px-6 py-2 rounded-full text-[10px] font-black uppercase">Join Zoom</a>
            </div>
            <div class="glass p-8 rounded-[35px] flex justify-between items-center border-l-4 border-purple-500">
                <div><h4 class="font-bold">Physics Session</h4><p class="text-[10px] opacity-50">Mr. Silva | 11:00 AM</p></div>
                <a href="#" class="bg-purple-500 px-6 py-2 rounded-full text-[10px] font-black uppercase">Join Zoom</a>
            </div>
        </div>
    </main>

    <script>
        // Set your password here
        const BATCH_PASS = "BMT2026"; 
        let isAuthorized = false;

        function nav(id) {
            document.querySelectorAll('main').forEach(p => p.classList.add('page-hidden'));
            document.getElementById('page-'+id).classList.remove('page-hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'opacity-100'));
            document.getElementById('btn-'+id).classList.add('nav-active', 'opacity-100');
        }

        function checkAccess() {
            if (isAuthorized) {
                nav('links');
            } else {
                document.getElementById('login-modal').classList.add('modal-show');
                document.getElementById('login-modal').classList.remove('modal-hidden');
            }
        }

        function verifyPass() {
            const input = document.getElementById('pass-input').value;
            if (input === BATCH_PASS) {
                isAuthorized = true;
                closeLogin();
                nav('links');
            } else {
                alert("Incorrect Password for BMT 23/24");
            }
        }

        function closeLogin() {
            document.getElementById('login-modal').classList.add('modal-hidden');
            document.getElementById('login-modal').classList.remove('modal-show');
        }

        window.onload = () => { AOS.init(); };
    </script>
</body>
</html>
